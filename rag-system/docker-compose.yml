services:
  rag-app:
    build: .
    container_name: rag-app
    env_file:
      - .env
    ports:
      - "7860:7860"   # Streamlit
      - "8000:8000"   # FastAPI (optional)
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    command: streamlit run frontend/app.py --server.address=0.0.0.0 --server.port=7860
